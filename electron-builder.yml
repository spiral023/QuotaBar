appId: com.quotabar.windows
productName: QuotaBar for Windows
publish:
  provider: github
  owner: spiral023
  repo: QuotaBar
  releaseType: release
protocols:
  - name: QuotaBar Protocol
    schemes:
      - quotabar
directories:
  output: package-output
files:
  - dist/**
  - package.json
  - assets/**
  - logos/**
  - src/renderer/**
  - src/config/**
extraResources:
  - from: logos
    to: logos
win:
  target:
    - nsis
    - portable
    - zip
  icon: assets/icon.ico
  # Fallback-Name fuer Targets ohne eigenen artifactName -> greift hier nur fuer zip.
  # Ergibt QuotaBar-<version>-win.zip (entpackter App-Ordner, ohne %TEMP%-Extraktion).
  artifactName: QuotaBar-${version}-win.${ext}
portable:
  artifactName: QuotaBar-${version}-portable.${ext}
nsis:
  artifactName: QuotaBar-${version}-setup.${ext}
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  license: LICENSE
