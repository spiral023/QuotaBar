appId: win.quotabar.app
productName: QuotaBar
publish:
  provider: github
  owner: spiral023
  repo: QuotaBar
  releaseType: release
protocols:
  - name: QuotaBar Protocol
    schemes:
      - quotabar
directories:
  output: package-output
files:
  - dist/**
  - package.json
  - assets/**
  - logos/**
  - src/renderer/**
  - src/config/**
extraResources:
  - from: logos
    to: logos
win:
  target:
    - nsis
    - portable
    - zip
  icon: assets/icon.ico
  # Fallback-Name fuer Targets ohne eigenen artifactName -> greift hier nur fuer zip.
  # Ergibt QuotaBar-<version>-win.zip (entpackter App-Ordner, ohne %TEMP%-Extraktion).
  artifactName: QuotaBar-${version}-win.${ext}
portable:
  artifactName: QuotaBar-${version}-portable.${ext}
nsis:
  artifactName: QuotaBar-${version}-setup.${ext}
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerSidebar: logos/nsis_logo.bmp
  uninstallerSidebar: logos/nsis_logo.bmp
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  license: LICENSE
  # Tray-App ohne eigenes Fenster: "Run QuotaBar"-Checkbox auf der Finish-Seite
  # vorausgewaehlt (User kann abwaehlen). Greift nur beim assisted installer.
  runAfterFinish: true
  # Daten-LOeschung wird im Deinstaller per Ja/Nein-Dialog abgefragt
  # (siehe build/installer.nsh, Default = behalten).
