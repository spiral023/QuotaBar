appId: com.quotabar.windows
productName: QuotaBar for Windows
publish: null
directories:
  output: package-output
files:
  - dist/**
  - package.json
  - assets/**
  - logos/**
  - src/renderer/**
win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
