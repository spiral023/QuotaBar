<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuotaBar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:       #07090d;
      --bg-surface:    #0b0e14;
      --bg-card:       #0f1319;
      --bg-card-hover: #121720;
      --bg-input:      rgba(255,255,255,0.04);

      --border:        rgba(255,255,255,0.07);
      --border-mid:    rgba(255,255,255,0.13);
      --border-focus:  rgba(82,208,23,0.4);

      --t100: #e6eff6;
      --t200: #b4c8d8;
      --t300: #8298aa;
      --t400: #506070;

      --green:  #52d017;
      --yellow: #ffd700;
      --orange: #ff8c00;
      --red:    #ff4444;
      --gray:   #475460;

      --claude-col:  #f59830;
      --codex-col:   #52d017;
      --r-card:  11px;
      --r-icon:  9px;
      --r-btn:   7px;
      --r-badge: 5px;
      --r-pill:  6px;
      --r-inner: 7px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; overflow: hidden; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
      color: var(--t100);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
    }

    /* ══ TITLE BAR ══════════════════════════════════════════ */
    .titlebar {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 8px 0 13px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }
    .titlebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .logo-name {
      font-family: 'Syne', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--t100);
    }
    .titlebar-btns {
      display: flex;
      align-items: center;
      gap: 1px;
      -webkit-app-region: no-drag;
    }

    .tbtn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: var(--r-btn);
      color: var(--t400);
      cursor: pointer;
      outline: none;
      transition-property: background, color, scale;
      transition-duration: 120ms;
      transition-timing-function: cubic-bezier(0.2, 0, 0, 1);
    }
    .tbtn:hover { background: rgba(255,255,255,0.055); color: var(--t200); }
    .tbtn:active { scale: 0.96; }
    .tbtn.active { color: var(--green); }
    .tbtn.spinning .icon-r { animation: spin 600ms linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ VIEWS ══════════════════════════════════════════════ */
    .view { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .view[hidden] { display: none; }

    /* ══ DASHBOARD ══════════════════════════════════════════ */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      scroll-behavior: smooth;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* ── Base card ──────────────────────────────────────────── */
    .card {
      position: relative;
      border-radius: var(--r-card);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 11px 12px;
      margin-bottom: 5px;
      overflow: hidden;
      animation: card-in 220ms cubic-bezier(0.2, 0, 0, 1) both;
      transition-property: background, border-color;
      transition-duration: 150ms;
    }
    .card:last-child { margin-bottom: 0; }
    .card:hover { background: var(--bg-card-hover); }

    .card.has-accent::before {
      content: '';
      position: absolute;
      left: 0; top: 10px; bottom: 10px;
      width: 2px;
      border-radius: 0 1px 1px 0;
      background: var(--card-accent, var(--gray));
      box-shadow: 1px 0 10px var(--card-accent, transparent);
      opacity: 0.8;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Overview card ──────────────────────────────────────── */
    .overview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 11px;
    }
    .overview-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--t400);
    }
    .overview-right {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .overview-total-lbl {
      font-size: 10px;
      color: var(--t300);
    }
    .overview-pct {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* Mini-bar rows */
    .mini-bars {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .mini-row {
      display: grid;
      grid-template-columns: 62px 1fr 28px;
      align-items: center;
      gap: 9px;
    }
    .mini-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--t200);
      white-space: nowrap;
    }
    .mini-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .mini-track {
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .mini-fill {
      height: 100%;
      border-radius: 2px;
      transition-property: width;
      transition-duration: 500ms;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mini-pct {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      color: var(--t300);
      text-align: right;
      white-space: nowrap;
    }

    /* ── Provider icon ──────────────────────────────────────── */
    .prov-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--r-icon);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      outline: 1px solid rgba(255,255,255,0.07);
    }
    .prov-logo {
      width: 26px;
      height: 26px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.35));
    }
    .prov-icon.icon-claude {
      background: linear-gradient(145deg, rgba(255,255,255,0.095) 0%, rgba(255,255,255,0.035) 100%);
      border: 1px solid rgba(245,152,48,0.28);
      box-shadow: 0 2px 12px rgba(245,152,48,0.16), inset 0 0 0 1px rgba(0,0,0,0.16);
      outline: none;
    }
    .prov-icon.icon-codex {
      background: linear-gradient(145deg, #0c1e13 0%, #172d1e 100%);
      border: 1px solid rgba(82,208,23,0.22);
      box-shadow: 0 2px 12px rgba(82,208,23,0.12);
      outline: none;
    }

    /* ── Card body: icon + info ─────────────────────────────── */
    .card-body {
      display: flex;
      gap: 11px;
      align-items: flex-start;
    }
    .card-info { flex: 1; min-width: 0; }

    .card-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 9px;
    }
    .prov-name {
      font-family: 'Syne', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--t100);
    }
    .card-right {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }
    .prov-pct {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition-property: color;
      transition-duration: 400ms;
    }
    .card-chevron {
      font-size: 15px;
      color: var(--t400);
      line-height: 1;
      font-weight: 400;
    }

    /* ── Bars ───────────────────────────────────────────────── */
    .bar-group { margin-bottom: 7px; }
    .bar-group:last-of-type { margin-bottom: 0; }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .bar-tag {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--t300);
    }
    .bar-cd {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9.5px;
      font-variant-numeric: tabular-nums;
      color: var(--t400);
    }
    .bar-track {
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-track.thick { height: 6px; }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition-property: width, background;
      transition-duration: 480ms;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }
    .c-green  { background: var(--green);  box-shadow: 0 0 7px rgba(82,208,23,0.45); }
    .c-yellow { background: var(--yellow); box-shadow: 0 0 7px rgba(255,215,0,0.4); }
    .c-orange { background: var(--orange); box-shadow: 0 0 7px rgba(255,140,0,0.45); }
    .c-red    { background: var(--red);    box-shadow: 0 0 7px rgba(255,68,68,0.5); }
    .c-gray   { background: var(--gray); }

    /* ── Badges ─────────────────────────────────────────────── */
    .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 9px; }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 9.5px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: var(--r-badge);
      line-height: 1.45;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .b-ok    { background: rgba(82,208,23,0.1);    color: #72e832; border: 1px solid rgba(82,208,23,0.22); }
    .b-warn  { background: rgba(255,215,0,0.1);    color: #ffd700; border: 1px solid rgba(255,215,0,0.24); }
    .b-bad   { background: rgba(255,68,68,0.1);    color: #ff7272; border: 1px solid rgba(255,68,68,0.22); }
    .b-cost  { background: rgba(255,255,255,0.05); color: var(--t200); border: 1px solid rgba(255,255,255,0.1); }
    .b-stale { background: rgba(130,152,170,0.1);  color: #96aebb; border: 1px solid rgba(130,152,170,0.2); }
    .b-error { background: rgba(255,68,68,0.08);   color: #ff7272; border: 1px solid rgba(255,68,68,0.18); }
    .b-auth  { background: rgba(255,140,0,0.08);   color: #ffa030; border: 1px solid rgba(255,140,0,0.18); }

    /* ── Status cards ─────────────────────────────────────── */
    .card-status-row { display: flex; align-items: center; justify-content: space-between; }
    .status-lbl { font-size: 12px; color: var(--t200); line-height: 1.4; text-wrap: pretty; }

    /* ── Tabs / reports ────────────────────────────────────── */
    .tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      padding: 6px 6px 0;
      background: var(--bg-base);
    }
    .tab-btn {
      height: 30px;
      border: 1px solid var(--border);
      border-radius: var(--r-btn);
      background: var(--bg-card);
      color: var(--t300);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn.active { color: var(--green); border-color: rgba(82,208,23,0.28); background: rgba(82,208,23,0.08); }
    .panel[hidden] { display: none; }
    .report-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .report-toolbar {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      padding: 6px;
      border-bottom: 1px solid var(--border);
    }
    .report-toolbar select,
    .report-toolbar input {
      min-width: 0;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--r-btn);
      background: var(--bg-card);
      color: var(--t200);
      font: 10px 'IBM Plex Mono', monospace;
      padding: 0 7px;
      outline: none;
    }
    .report-toolbar .wide { grid-column: span 2; }
    .report-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 0 6px 6px; }
    .report-action {
      height: 29px;
      border-radius: var(--r-btn);
      border: 1px solid rgba(82,208,23,0.22);
      background: rgba(82,208,23,0.08);
      color: var(--green);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .report-table { width: 100%; border-collapse: collapse; font: 10px 'IBM Plex Mono', monospace; color: var(--t200); }
    .report-table th, .report-table td { padding: 5px 4px; border-bottom: 1px solid var(--border); text-align: right; white-space: nowrap; }
    .report-table th:first-child, .report-table td:first-child,
    .report-table th:nth-child(2), .report-table td:nth-child(2) { text-align: left; }
    .report-summary { font: 10px 'IBM Plex Mono', monospace; color: var(--t300); padding: 6px 8px; border-bottom: 1px solid var(--border); }

    /* ── TIP card ───────────────────────────────────────────── */
    .tip-body-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .tip-icon-box {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: rgba(82,208,23,0.1);
      border: 1px solid rgba(82,208,23,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tip-content { flex: 1; min-width: 0; }
    .tip-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 3px;
    }
    .tip-text {
      font-size: 11px;
      color: var(--t200);
      line-height: 1.5;
      text-wrap: pretty;
    }

    /* ── Empty / loading ────────────────────────────────────── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 40px 16px;
      color: var(--t400); font-size: 12px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 1.5px solid rgba(255,255,255,0.06);
      border-top-color: var(--t300);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }

    /* ══ SETTINGS ══════════════════════════════════════════════ */
    .settings-wrap {
      flex: 1; overflow-y: auto; padding: 8px 10px 10px;
    }
    .settings-wrap::-webkit-scrollbar { width: 3px; }
    .settings-wrap::-webkit-scrollbar-track { background: transparent; }
    .settings-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .s-section { margin-bottom: 5px; }
    .s-section-title {
      font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--t400);
      padding: 5px 3px 5px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }

    .pill-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .pill-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .pill {
      padding: 7px 0; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-pill); color: var(--t200);
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      cursor: pointer; text-align: center; outline: none;
      transition-property: background, border-color, color, scale; transition-duration: 120ms;
    }
    .pill:hover { background: var(--bg-card-hover); color: var(--t100); }
    .pill:active { scale: 0.96; }
    .pill.active { background: rgba(82,208,23,0.1); border-color: rgba(82,208,23,0.32); color: var(--green); }

    .cost-rows { border: 1px solid var(--border); border-radius: var(--r-card); overflow: hidden; }
    .cost-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 11px; border-bottom: 1px solid var(--border);
    }
    .cost-row:last-child { border-bottom: none; }
    .cost-label { font-size: 12px; color: var(--t200); font-weight: 500; }
    .cost-wrap {
      display: flex; align-items: center; gap: 2px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--r-inner); padding: 4px 8px;
      transition-property: border-color, box-shadow; transition-duration: 120ms;
    }
    .cost-wrap:focus-within { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(82,208,23,0.1); }
    .cost-sym { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--t400); }
    .cost-field {
      width: 50px; background: none; border: none; outline: none;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      font-variant-numeric: tabular-nums; color: var(--t100); text-align: right;
    }
    .cost-field::placeholder { color: var(--t400); }
    .cost-field::-webkit-inner-spin-button,
    .cost-field::-webkit-outer-spin-button { -webkit-appearance: none; }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 11px; border: 1px solid var(--border); border-radius: var(--r-card);
    }
    .toggle-label { font-size: 12px; color: var(--t200); font-weight: 500; }

    .tgl { position: relative; width: 34px; height: 19px; flex-shrink: 0; }
    .tgl input { opacity: 0; width: 0; height: 0; }
    .tgl-track {
      position: absolute; inset: 0; border-radius: 10px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      cursor: pointer; transition-property: background, border-color; transition-duration: 150ms;
    }
    .tgl-track::after {
      content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px; border-radius: 50%; background: var(--t400);
      transition-property: transform, background; transition-duration: 150ms;
    }
    .tgl input:checked + .tgl-track { background: rgba(82,208,23,0.18); border-color: rgba(82,208,23,0.36); }
    .tgl input:checked + .tgl-track::after { transform: translateX(15px) translateY(-50%); background: var(--green); }

    .save-btn {
      width: 100%; padding: 9px 0; margin-top: 10px;
      background: rgba(82,208,23,0.09); border: 1px solid rgba(82,208,23,0.22);
      border-radius: var(--r-card); color: var(--green);
      font-family: 'DM Sans', system-ui, sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; outline: none;
      transition-property: background, scale; transition-duration: 120ms;
    }
    .save-btn:hover { background: rgba(82,208,23,0.15); }
    .save-btn:active { scale: 0.98; }
    .save-btn:disabled { opacity: 0.55; cursor: default; }
    .save-note { font-size: 9.5px; color: var(--t400); text-align: center; margin-top: 6px; line-height: 1.4; }

    /* ── Token detail ───────────────────────────────────────────── */
    .token-section {
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px solid var(--border);
    }
    .token-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px 8px;
    }
    .token-cell {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .token-cell-lbl {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--t400);
    }
    .token-cell-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      font-variant-numeric: tabular-nums;
      color: var(--t200);
    }
    .token-cell-val.is-cost { color: var(--t100); }
    .token-models {
      margin-top: 5px;
      font-size: 9px;
      color: var(--t400);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ══ FOOTER ═════════════════════════════════════════════════ */
    .footer {
      height: 35px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 6px 0 13px;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
    }
    .footer-status {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .footer-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px rgba(82,208,23,0.7);
      flex-shrink: 0;
    }
    .footer-ts {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9.5px;
      font-variant-numeric: tabular-nums;
      color: var(--t300);
    }
    .footer-btns { display: flex; align-items: center; gap: 1px; }

    /* ══ DASHBOARD 2-SPALTEN ═══════════════════════════════════════ */
    .view-dashboard #view-dashboard {
      display: grid;
      grid-template-columns: 1fr 360px;
      grid-template-rows: 1fr;
      min-height: 0;
    }
    .view-dashboard .content {
      grid-column: 1;
      border-right: 1px solid var(--border);
    }
    .view-dashboard #right-panel {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      padding: 8px 10px;
    }
    .view-compact #right-panel { display: none; }

    /* Quick Stats Kacheln */
    .qs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-bottom: 8px;
    }
    .qs-tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 9px 11px;
    }
    .qs-tile-lbl {
      font-size: 8px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--t400); margin-bottom: 4px;
    }
    .qs-tile-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px; font-weight: 500;
      font-variant-numeric: tabular-nums; line-height: 1;
    }

    /* Top Models Tabelle */
    .top-models-table {
      width: 100%; border-collapse: collapse;
      font-size: 10.5px; margin-bottom: 8px;
    }
    .top-models-table th {
      font-size: 8px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--t400);
      padding: 4px 6px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .top-models-table td {
      padding: 5px 6px; color: var(--t200);
      font-family: 'IBM Plex Mono', monospace;
      font-variant-numeric: tabular-nums;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .top-models-table tr:last-child td { border-bottom: none; }
    .top-models-table .model-name {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 10px; max-width: 130px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Right Panel Section Header */
    .rp-section { margin-bottom: 8px; }
    .rp-section-title {
      font-size: 8px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--t400);
      padding: 4px 3px 6px; border-bottom: 1px solid var(--border);
      margin-bottom: 7px;
    }

    /* ══ COMPACT INSIGHTS ═══════════════════════════════════════════ */
    .view-compact .insights-panel {
      margin: 4px 6px 0;
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      background: var(--bg-card);
      overflow: hidden;
    }
    .view-dashboard .insights-panel { display: none; }

    .insights-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 11px; cursor: pointer;
      font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--t400);
    }
    .insights-toggle:hover { color: var(--t200); }
    .insights-toggle-icon { font-size: 12px; transition: transform 120ms; }
    .insights-panel.open .insights-toggle-icon { transform: rotate(180deg); }

    .insights-body {
      display: none;
      padding: 0 11px 10px;
    }
    .insights-panel.open .insights-body { display: block; }

    .insights-row1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; font-variant-numeric: tabular-nums;
      color: var(--t100); margin-bottom: 3px;
    }
    .insights-row2 {
      font-size: 10px; color: var(--t300); margin-bottom: 7px;
    }
    .insights-sparkline {
      display: flex; align-items: flex-end; gap: 3px;
      height: 24px; margin-bottom: 3px;
    }
    .sparkline-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 1px; align-items: stretch; }
    .sparkline-bar {
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      transition: height 300ms;
    }
    .sparkline-label {
      font-size: 8px; color: var(--t400); text-align: right;
    }
  </style>
  <script src="shared/ipc.js"></script>
  <script src="shared/format.js"></script>
  <script src="shared/colors.js"></script>
  <script src="tabs/live.js"></script>
</head>
<body>

  <!-- ── Title Bar ──────────────────────────────────────── -->
  <div class="titlebar">
    <div class="titlebar-logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 1L17 9L9 17L1 9Z" fill="#52d017" opacity="0.85"/>
        <path d="M9 4.5L13.5 9L9 13.5L4.5 9Z" fill="#07090d"/>
        <path d="M9 7L11 9L9 11L7 9Z" fill="#52d017" opacity="0.65"/>
      </svg>
      <span class="logo-name">QuotaBar</span>
    </div>
    <div class="titlebar-btns">
      <button class="tbtn" id="btn-refresh" title="Refresh now">
        <svg class="icon-r" width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1.5 7a5.5 5.5 0 0 1 9.9-3.3"/>
          <path d="M12.5 7a5.5 5.5 0 0 1-9.9 3.3"/>
          <path d="M11 2.2 13 4l-2 1.8"/>
          <path d="M3 11.8 1 10l2-1.8"/>
        </svg>
      </button>
      <button class="tbtn" id="btn-pin" title="Keep window open">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6.5" y1="8.5" x2="6.5" y2="12"/>
          <path d="M4 8.5h5"/>
          <path d="M4.5 8.5V5.5L3 3.5V2h7v1.5L8.5 5.5v3"/>
        </svg>
      </button>
      <button class="tbtn" id="btn-view-switch" title="Ansicht wechseln">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"
             stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="5" height="5" rx="1"/>
          <rect x="7" y="1" width="5" height="5" rx="1"/>
          <rect x="1" y="7" width="5" height="5" rx="1"/>
          <rect x="7" y="7" width="5" height="5" rx="1"/>
        </svg>
      </button>
      <button class="tbtn" id="btn-close" title="Close">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <line x1="1" y1="1" x2="10" y2="10"/>
          <line x1="10" y1="1" x2="1"  y2="10"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Dashboard View ─────────────────────────────────── -->
  <div class="view" id="view-dashboard">
    <div class="content" id="content">
      <div class="empty">
        <div class="spinner"></div>
        <span>Loading…</span>
      </div>
    </div>
    <!-- Rechtes Panel (nur Dashboard-Modus) -->
    <div id="right-panel">
      <div class="rp-section">
        <div class="rp-section-title">Quick Stats</div>
        <div class="qs-grid" id="qs-grid">
          <div class="qs-tile"><div class="qs-tile-lbl">API-Äq. (30d)</div><div class="qs-tile-val" id="qs-api-cost">—</div></div>
          <div class="qs-tile"><div class="qs-tile-lbl">Abo ROI</div><div class="qs-tile-val" id="qs-roi">—</div></div>
          <div class="qs-tile"><div class="qs-tile-lbl">Aktive Tage</div><div class="qs-tile-val" id="qs-active-days">—</div></div>
          <div class="qs-tile"><div class="qs-tile-lbl">Ø Session</div><div class="qs-tile-val" id="qs-session">—</div></div>
        </div>
      </div>
      <div class="rp-section">
        <div class="rp-section-title">Top Models (30d)</div>
        <table class="top-models-table" id="top-models-table">
          <thead><tr><th>Modell</th><th>Kosten</th><th>%</th></tr></thead>
          <tbody id="top-models-body"><tr><td colspan="3" style="color:var(--t400);text-align:center">Lädt…</td></tr></tbody>
        </table>
      </div>
      <div class="rp-section">
        <div class="rp-section-title">Cost Window</div>
        <div class="pill-grid-3" id="window-pill-grid">
          <button class="pill" data-win="7d">7 Tage</button>
          <button class="pill" data-win="30d">30 Tage</button>
          <button class="pill active" data-win="billing">Abrechn.</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Compact Insights (nur Compact-Modus) -->
  <div class="insights-panel" id="insights-panel">
    <div class="insights-toggle" id="insights-toggle">
      INSIGHTS <span class="insights-toggle-icon">∨</span>
    </div>
    <div class="insights-body">
      <div class="insights-row1" id="ins-cost-roi">—</div>
      <div class="insights-row2" id="ins-days-session">—</div>
      <div class="insights-sparkline" id="ins-sparkline"></div>
      <div class="sparkline-label" id="ins-sparkline-label">7-Tage Kosten</div>
    </div>
  </div>

  <!-- ── Settings View ──────────────────────────────────── -->
  <div class="view" id="view-settings" hidden>
    <div class="settings-wrap">
      <div class="s-section">
        <div class="s-section-title">Refresh Interval</div>
        <div class="pill-grid" id="pill-grid">
          <button class="pill" data-val="30">30s</button>
          <button class="pill active" data-val="60">1m</button>
          <button class="pill" data-val="120">2m</button>
          <button class="pill" data-val="300">5m</button>
        </div>
      </div>

      <div class="s-section">
        <div class="s-section-title">Subscription Cost / month</div>
        <div class="cost-rows">
          <div class="cost-row">
            <span class="cost-label">Claude</span>
            <div class="cost-wrap">
              <span class="cost-sym">$</span>
              <input class="cost-field" id="cost-claude" type="number" min="0" step="1" placeholder="20">
            </div>
          </div>
          <div class="cost-row">
            <span class="cost-label">Codex</span>
            <div class="cost-wrap">
              <span class="cost-sym">$</span>
              <input class="cost-field" id="cost-codex" type="number" min="0" step="1" placeholder="10">
            </div>
          </div>
        </div>
      </div>

      <div class="s-section">
        <div class="s-section-title">Options</div>
        <div class="toggle-row">
          <span class="toggle-label">Pricing Offline Mode</span>
          <label class="tgl">
            <input type="checkbox" id="tog-offline">
            <span class="tgl-track"></span>
          </label>
        </div>
      </div>

      <button class="save-btn" id="btn-save">Save Settings</button>
      <div class="save-note">Refresh interval changes take effect on restart</div>
    </div>
  </div>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <div class="footer">
    <div class="footer-status">
      <div class="footer-dot" id="footer-dot"></div>
      <span class="footer-ts" id="footer-ts">—</span>
    </div>
    <div class="footer-btns">
      <button class="tbtn" id="btn-settings" title="Settings">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"
             stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6.5" cy="6.5" r="2"/>
          <path d="M6.5 1v1.2M6.5 10.8V12M1 6.5h1.2M10.8 6.5H12M2.7 2.7l.85.85M9.45 9.45l.85.85M9.45 3.55l-.85.85M3.55 9.45l-.85.85"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    let lastRefreshedAt = null;
    let footerTimer     = null;
    let activePillVal    = 60;
    let inSettings       = false;

    // ── IPC ──────────────────────────────────────────────────────

    QB.ipc.on('quota:update', (_, data) => {
      lastRefreshedAt = data.lastRefreshedAt ? new Date(data.lastRefreshedAt) : new Date();
      render(data.snapshots);
      loadAnalyticsSummary();
      startFooterTimer();
    });

    QB.ipc.send('quota:ready');

    QB.ipc.on('quota:ready-ack', async (_, data) => {
      document.body.classList.toggle('view-dashboard', data.viewMode === 'dashboard');
      document.body.classList.toggle('view-compact',   data.viewMode !== 'dashboard');
      const s = await QB.ipc.invoke('settings:get');
      // Cost Window initialisieren
      const activeCostWindow = s.costWindow ?? 'billing';
      document.querySelectorAll('#window-pill-grid .pill').forEach(p => {
        p.classList.toggle('active', p.dataset.win === activeCostWindow);
      });
      // Insights-Panel Zustand
      if (s.insightsPanelOpen) document.getElementById('insights-panel').classList.add('open');
      // Analytics sofort laden
      loadAnalyticsSummary();
    });

    QB.ipc.on('window:pin-state', (_, pinned) => {
      document.getElementById('btn-pin').classList.toggle('active', pinned);
      document.getElementById('btn-pin').title = pinned ? 'Unpin window' : 'Keep window open';
    });

    // ── Global buttons ───────────────────────────────────────────

    document.getElementById('btn-pin').addEventListener('click', () => {
      QB.ipc.send('window:toggle-pin');
    });

    document.getElementById('btn-refresh').addEventListener('click', () => {
      const btn = document.getElementById('btn-refresh');
      btn.classList.add('spinning');
      QB.ipc.send('quota:refresh');
      setTimeout(() => btn.classList.remove('spinning'), 1600);
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      QB.ipc.send('window:close');
    });

    document.getElementById('btn-view-switch').addEventListener('click', async () => {
      const settings = await QB.ipc.invoke('settings:get');
      const newMode = settings.viewMode === 'dashboard' ? 'compact' : 'dashboard';
      await QB.ipc.invoke('window:set-view', newMode);
    });

    document.getElementById('btn-settings').addEventListener('click', () => {
      inSettings = !inSettings;
      document.getElementById('view-dashboard').hidden = inSettings;
      document.getElementById('view-settings').hidden  = !inSettings;
      document.getElementById('btn-settings').classList.toggle('active', inSettings);
      if (inSettings) loadSettingsUI();
    });

    // ── Interval pills ───────────────────────────────────────────

    document.querySelectorAll('#pill-grid .pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activePillVal = parseInt(btn.dataset.val, 10);
        document.querySelectorAll('#pill-grid .pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // ── Settings: load ───────────────────────────────────────────

    async function loadSettingsUI() {
      try {
        const s = await QB.ipc.invoke('settings:get');
        document.getElementById('cost-claude').value   = s.subscriptionCosts?.claude ?? 20;
        document.getElementById('cost-codex').value    = s.subscriptionCosts?.codex  ?? 10;
        document.getElementById('tog-offline').checked = !!s.pricingOfflineMode;

        activePillVal = s.pollIntervalSeconds ?? 60;
        const stdVals = [30, 60, 120, 300];
        const closest = stdVals.reduce((a, b) =>
          Math.abs(b - activePillVal) < Math.abs(a - activePillVal) ? b : a);
        document.querySelectorAll('#pill-grid .pill').forEach(p => {
          p.classList.toggle('active', parseInt(p.dataset.val, 10) === closest);
        });
      } catch (e) {
        console.error('Failed to load settings', e);
      }
    }

    // ── Settings: save ───────────────────────────────────────────

    document.getElementById('btn-save').addEventListener('click', async () => {
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      const payload = {
        pollIntervalSeconds: activePillVal,
        subscriptionCosts: {
          claude: parseFloat(document.getElementById('cost-claude').value) || 20,
          codex:  parseFloat(document.getElementById('cost-codex').value)  || 10,
        },
        pricingOfflineMode: document.getElementById('tog-offline').checked,
      };

      try {
        await QB.ipc.invoke('settings:save', payload);
        btn.textContent = '✓ Saved';
        setTimeout(() => { btn.textContent = 'Save Settings'; btn.disabled = false; }, 1800);
      } catch {
        btn.textContent = 'Error — try again';
        btn.disabled = false;
      }
    });
    // ── Render ────────────────────────────────────────────

    function render(snapshots) {
      QB.renderLive(snapshots);
    }

    // ── Analytics Summary laden ──────────────────────────────────────

    async function loadAnalyticsSummary() {
      try {
        const s = await QB.ipc.invoke('analytics:summary');
        updateQuickStats(s);
        updateTopModels(s);
        updateInsights(s);
      } catch (e) {
        console.error('analytics:summary failed', e);
      }
    }

    function updateQuickStats(s) {
      const roi = s.roiFactor?.combined ?? 0;
      document.getElementById('qs-api-cost').textContent    = `$${(s.apiCostUSD?.total ?? 0).toFixed(0)}`;
      document.getElementById('qs-roi').textContent         = `${roi.toFixed(1)}×`;
      document.getElementById('qs-roi').style.color         = QB.roiColor(roi);
      document.getElementById('qs-active-days').textContent = `${s.activeDays ?? 0}/${s.windowDays ?? 30}`;
      document.getElementById('qs-session').textContent     = `${s.avgSessionMinutes ?? 0} min`;
    }

    function updateTopModels(s) {
      const tbody = document.getElementById('top-models-body');
      if (!s.topModels?.length) {
        tbody.innerHTML = '<tr><td colspan="3" style="color:var(--t400);text-align:center">Keine Daten</td></tr>';
        return;
      }
      tbody.innerHTML = s.topModels.map(m =>
        `<tr>
          <td class="model-name" title="${QB.esc(m.model)}">${QB.esc(m.model.replace(/^claude-|^gpt-/,''))}</td>
          <td>$${(m.costUSD).toFixed(2)}</td>
          <td>${(m.pctOfTotal * 100).toFixed(0)}%</td>
        </tr>`
      ).join('');
    }

    function updateInsights(s) {
      const roi  = s.roiFactor?.combined ?? 0;
      const cost = s.apiCostUSD?.total ?? 0;
      const sub  = s.subscriptionCostUSD?.total ?? 0;
      document.getElementById('ins-cost-roi').textContent =
        `$${cost.toFixed(0)} API-Äq.  vs $${sub.toFixed(0)} Abo  ${roi.toFixed(1)}×`;
      document.getElementById('ins-cost-roi').style.color = QB.roiColor(roi);
      document.getElementById('ins-days-session').textContent =
        `${s.activeDays ?? 0}/${s.windowDays ?? 30} Tage aktiv · Ø ${s.avgSessionMinutes ?? 0} min/Ses`;
      renderSparkline(s.sparkline7d ?? []);
    }

    function renderSparkline(data) {
      const container = document.getElementById('ins-sparkline');
      if (!data.length) { container.innerHTML = ''; return; }
      const maxVal = Math.max(...data.map(d => d.claudeUSD + d.codexUSD), 0.01);
      container.innerHTML = data.map(d => {
        const total  = d.claudeUSD + d.codexUSD;
        const cPct   = Math.round((d.claudeUSD / maxVal) * 100);
        const dPct   = Math.round((d.codexUSD  / maxVal) * 100);
        return `<div class="sparkline-bar-wrap" title="${d.date}: $${total.toFixed(2)}">
          <div class="sparkline-bar" style="height:${cPct}%;background:var(--claude-col)"></div>
          <div class="sparkline-bar" style="height:${dPct}%;background:var(--codex-col)"></div>
        </div>`;
      }).join('');
    }

    // Insights-Panel Toggle
    document.getElementById('insights-toggle').addEventListener('click', async () => {
      const panel = document.getElementById('insights-panel');
      const isOpen = panel.classList.toggle('open');
      const s = await QB.ipc.invoke('settings:get');
      await QB.ipc.invoke('settings:save', { ...s, insightsPanelOpen: isOpen });
    });

    // Cost-Window-Pills im rechten Panel
    document.querySelectorAll('#window-pill-grid .pill').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.querySelectorAll('#window-pill-grid .pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const s = await QB.ipc.invoke('settings:get');
        await QB.ipc.invoke('settings:save', { ...s, costWindow: btn.dataset.win });
      });
    });

    // ── Footer ────────────────────────────────────────────────────

    function startFooterTimer() {
      if (footerTimer) clearInterval(footerTimer);
      updateFooter();
      footerTimer = setInterval(updateFooter, 5000);
    }
    function updateFooter() {
      const el = document.getElementById('footer-ts');
      if (!lastRefreshedAt || !el) return;
      const sec = Math.round((Date.now() - lastRefreshedAt.getTime()) / 1000);
      if (sec < 10)  { el.textContent = 'Just updated'; return; }
      if (sec < 60)  { el.textContent = `Updated ${sec}s ago`; return; }
      el.textContent = `Updated ${Math.floor(sec / 60)}m ago`;
    }
  </script>
</body>
</html>
