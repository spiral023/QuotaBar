name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        shell: bash
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          node -e "require('./dist/build/versionTag').assertTagMatches(process.env.GIT_TAG, require('./package.json').version)"

      - name: Pre-create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" 2>/dev/null || \
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "" \
              --draft=false

      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Collect builds (versioned + latest)
        shell: bash
        run: |
          mkdir -p upload
          # Versionierte Dateien (z.B. QuotaBar-1.0.3-portable.exe / -setup.exe / -win.zip)
          cp package-output/QuotaBar-*-portable.exe upload/
          cp package-output/QuotaBar-*-setup.exe upload/
          cp package-output/QuotaBar-*-win.zip upload/
          # Zusätzliche "latest"-Kopien mit festem Namen für stabile Links
          cp package-output/QuotaBar-*-portable.exe upload/QuotaBar-portable.exe
          cp package-output/QuotaBar-*-setup.exe upload/QuotaBar-Setup.exe
          cp package-output/QuotaBar-*-win.zip upload/QuotaBar.zip
          ls -la upload/

      - name: Upload builds as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: upload/
          retention-days: 1

  ftp:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: builds
          path: upload

      - name: Upload portable to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: "./upload/*"
          # Login ist auf das Zielverzeichnis gechrootet -> "./" = Login-Home (im Client als /quotabar/ sichtbar)
          remote_path: "./"
          sftp_only: true
